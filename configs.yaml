MAIN_MODEL: "openai/gpt-oss-120b"
EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"

# Conflict Detector
CONFLICT_CONFIDENCE_THRESHOLD: 0.75   # Min confidence to count a pair as a confirmed contradiction
CONFLICT_SIMILARITY_THRESHOLD: 0.10   # Pairs below this cosine similarity are skipped (unrelated topics)
CONFLICT_MAX_RETRIES: 3               # LLM call retries on transient failure
CONFLICT_RETRY_DELAY: 2.0             # Base delay (seconds) for exponential backoff
CONFLICT_MAX_CONCURRENT: 3            # Max parallel LLM calls (respects Groq rate limits)

# Search agent configuration
SEARCH_TEMPERATURE: 0
MAX_ITERATIONS: 5
MIN_SOURCES: 3
MIN_DOMAINS: 2
TAVILY_MAX_RESULTS: 5
REACT_SYSTEM: |-
  You are a search agent operating in a ReAct loop.
  For each step you receive:
  - The sub-question you are researching
  - The results found so far (count and domains)

  Respond with exactly one of:
  - STOP  (if you have >= {min_sources} results from >= {min_domains} different domains)
  - SEARCH: <your refined query>  (to run another search)

  No explanation. No other text.



# Decomposer Configurations
MIN_QUESTIONS: 2
MAX_QUESTIONS: 5