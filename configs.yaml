MAIN_MODEL: "openai/gpt-oss-120b"
EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"

# Conflict Detector
CONFLICT_CONFIDENCE_THRESHOLD: 0.75   # Min confidence to count a pair as a confirmed contradiction
CONFLICT_SIMILARITY_THRESHOLD: 0.10   # Pairs below this cosine similarity are skipped (unrelated topics)
CONFLICT_MAX_RETRIES: 3               # LLM call retries on transient failure
CONFLICT_RETRY_DELAY: 2.0             # Base delay (seconds) for exponential backoff
CONFLICT_MAX_CONCURRENT: 3            # Max parallel LLM calls (respects Groq rate limits)
LANGCHAIN_TRACING_V2: true            # Enable LangSmith tracing for this module

# Search agent configuration
SEARCH_TEMPERATURE: 0
MAX_ITERATIONS: 6
MIN_SOURCES: 4
MIN_DOMAINS: 3
TAVILY_MAX_RESULTS: 8

# Decomposer Configurations
MIN_QUESTIONS: 2
MAX_QUESTIONS: 5

#retriever
CHUNK_SIZE: 512
CHUNK_OVERLAP: 64
TOP_K: 20
CE_TOP_N: 40
TOP_N: 5
MMR_LAMBDA: 0.7
RRF_K: 60

EMBEDDING_MODEL: "BAAI/bge-small-en-v1.5"
RERANKING_MODEL: "BAAI/bge-reranker-base"
QUERY_PREFIX: "Represent this sentence for searching relevant passages: "
COLLECTION_NAME: "passages"
DELETE_AFTER: false        # set to true to auto-delete Qdrant collections after each retrieval call
COLLECTION_THRESHOLD: 900  # delete oldest collections when count exceeds this (Qdrant free tier limit: 1000)

VERBOSE: False
